; Capsule Radar — Marine (AIS) — Waveshare ESP32-S3-Touch-AMOLED-1.75
;
; Two environments:
;   esp32-s3-amoled-175  -> real firmware (Arduino_GFX + LVGL + WSS AIS), flashed to the board
;   native               -> desktop LVGL simulator (SDL2), runs the scope on the Mac
;
; Build/run the simulator:   pio run -e native -t exec
; Build/flash the device:    pio run -e esp32-s3-amoled-175 -t upload

[env:esp32-s3-amoled-175]
; pioarduino fork of the espressif32 platform (Arduino core 3.x / ESP-IDF 5.x).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1      ; generic S3; matches ESP32-S3R8 (8MB PSRAM / 16MB flash)
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; sim_main.cpp is desktop-only (has its own main() + SDL); keep it out of the firmware
build_src_filter = +<*> -<sim_main.cpp>

; ESP32-S3R8: QIO flash + OPI PSRAM, 16 MB flash + matching partition table
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0              ; silence Arduino library [E] spam; our own [ais]/[wifi] logs are unaffected
    -DLV_CONF_INCLUDE_SIMPLE          ; LVGL does #include "lv_conf.h"
    -I${PROJECT_DIR}/include          ; ...and finds it here
    -std=gnu++17
build_unflags = -std=gnu++11

lib_deps =
    moononournation/GFX Library for Arduino @ 1.6.4   ; has Arduino_CO5300 + Arduino_ESP32QSPI
    lvgl/lvgl @ 8.4.0                                  ; lv_conf.h in include/ targets v8
    bblanchon/ArduinoJson @ ^7.0.4                     ; parse AIS JSON
    links2004/WebSockets @ ^2.4.1                      ; WSS (secure WebSocket) client for aisstream
    https://github.com/tzapu/WiFiManager.git
    lewisxhe/XPowersLib                                ; AXP2101 battery gauge
    mikalhart/TinyGPSPlus                              ; NMEA parsing for the LC76G GPS (-G variant)
; Notes:
; - lv_conf.h lives in include/ (added to the include path above).
; - Versions are pinned to a known-good combination for this panel; bump deliberately.

; --- OTA upload (flash over WiFi) -------------------------------------------
[env:esp32-s3-amoled-175-ota]
extends = env:esp32-s3-amoled-175
upload_protocol = espota
upload_port = capsule-marine.local

; --- Desktop LVGL simulator (SDL2) -------------------------------------------
; Builds only the portable scope renderer + the SDL sim main; no Arduino_GFX / WiFi.
[env:native]
platform = native
build_src_filter = -<*> +<radar_view.cpp> +<ui.cpp> +<coastline.cpp> +<sim_main.cpp>
build_flags =
    !sdl2-config --cflags --libs      ; SDL2 include/lib flags (Homebrew sdl2)
    -DLV_CONF_INCLUDE_SIMPLE
    -I${PROJECT_DIR}/include
    -DLV_LOG_PRINTF=1
    -std=gnu++17
lib_deps =
    lvgl/lvgl @ 8.4.0
